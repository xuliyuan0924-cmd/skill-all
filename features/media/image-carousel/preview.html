<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预览：图片轮播组件</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .demo-wrapper {
      width: 100%;
      max-width: 800px;
    }

    .demo-title {
      text-align: center;
      margin-bottom: 24px;
      color: #1a1a1a;
      font-size: 22px;
      font-weight: 600;
    }

    /* ── 轮播容器 ── */
    .carousel {
      position: relative;
      width: 100%;
      height: 480px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      cursor: grab;
      user-select: none;
    }

    .carousel:active { cursor: grabbing; }

    /* ── 滑动轨道 ── */
    .track {
      display: flex;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .track.no-transition { transition: none; }

    /* ── 单张幻灯片 ── */
    .slide {
      flex: 0 0 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    .slide-bg {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      letter-spacing: 2px;
    }

    /* 5 种占位渐变色模拟不同图片 */
    .slide:nth-child(1) .slide-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .slide:nth-child(2) .slide-bg { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .slide:nth-child(3) .slide-bg { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .slide:nth-child(4) .slide-bg { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
    .slide:nth-child(5) .slide-bg { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }

    /* ── 左右箭头 ── */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: background 0.2s ease, transform 0.2s ease;
      z-index: 10;
      font-size: 18px;
      color: #333;
    }

    .arrow:hover {
      background: #fff;
      transform: translateY(-50%) scale(1.08);
    }

    .arrow-prev { left: 16px; }
    .arrow-next { right: 16px; }

    /* ── 圆点指示器 ── */
    .dots {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      border: none;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* ── 状态提示 ── */
    .status {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #888;
    }

    .status .paused { color: #e53e3e; }

    /* ── 预览说明 ── */
    .preview-badge {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="demo-wrapper">
    <p class="demo-title">图片轮播组件</p>

    <div class="carousel" id="carousel">
      <div class="track" id="track">
        <div class="slide"><div class="slide-bg">图片 1</div></div>
        <div class="slide"><div class="slide-bg">图片 2</div></div>
        <div class="slide"><div class="slide-bg">图片 3</div></div>
        <div class="slide"><div class="slide-bg">图片 4</div></div>
        <div class="slide"><div class="slide-bg">图片 5</div></div>
      </div>

      <button class="arrow arrow-prev" id="prev">&#8592;</button>
      <button class="arrow arrow-next" id="next">&#8594;</button>

      <div class="dots" id="dots"></div>
    </div>

    <p class="status" id="status">自动播放中（每 4 秒切换）· 悬停暂停</p>
  </div>

  <div class="preview-badge">功能池预览 · 图片轮播组件</div>

  <script>
    const track = document.getElementById('track');
    const carousel = document.getElementById('carousel');
    const dotsContainer = document.getElementById('dots');
    const statusEl = document.getElementById('status');

    const TOTAL = 5;
    const INTERVAL = 4000;
    let current = 0;
    let autoTimer = null;
    let isPaused = false;

    /* ── 生成圆点 ── */
    for (let i = 0; i < TOTAL; i++) {
      const dot = document.createElement('button');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dotsContainer.appendChild(dot);
    }

    function getDots() {
      return dotsContainer.querySelectorAll('.dot');
    }

    /** 跳转到指定幻灯片 */
    function goTo(index) {
      current = (index + TOTAL) % TOTAL;
      track.style.transform = `translateX(-${current * 100}%)`;
      getDots().forEach((d, i) => d.classList.toggle('active', i === current));
    }

    /** 下一张 */
    function next() { goTo(current + 1); }

    /** 上一张 */
    function prev() { goTo(current - 1); }

    /* ── 自动播放 ── */
    function startAuto() {
      stopAuto();
      autoTimer = setInterval(next, INTERVAL);
    }

    function stopAuto() {
      if (autoTimer) clearInterval(autoTimer);
    }

    /* ── 按钮事件 ── */
    document.getElementById('next').addEventListener('click', () => { goTo(current + 1); startAuto(); });
    document.getElementById('prev').addEventListener('click', () => { goTo(current - 1); startAuto(); });

    /* ── 悬停暂停 ── */
    carousel.addEventListener('mouseenter', () => {
      stopAuto();
      isPaused = true;
      statusEl.innerHTML = '已暂停 <span class="paused">●</span>（移开鼠标恢复自动播放）';
    });

    carousel.addEventListener('mouseleave', () => {
      startAuto();
      isPaused = false;
      statusEl.textContent = '自动播放中（每 4 秒切换）· 悬停暂停';
    });

    /* ── 触摸 / 鼠标拖拽滑动 ── */
    let startX = 0;
    let isDragging = false;

    function onStart(x) { startX = x; isDragging = true; }
    function onEnd(x) {
      if (!isDragging) return;
      isDragging = false;
      const diff = startX - x;
      if (Math.abs(diff) > 50) {
        diff > 0 ? next() : prev();
        startAuto();
      }
    }

    carousel.addEventListener('touchstart', (e) => onStart(e.touches[0].clientX), { passive: true });
    carousel.addEventListener('touchend', (e) => onEnd(e.changedTouches[0].clientX));
    carousel.addEventListener('mousedown', (e) => onStart(e.clientX));
    carousel.addEventListener('mouseup', (e) => onEnd(e.clientX));

    /* ── 启动 ── */
    startAuto();
  </script>
</body>
</html>
