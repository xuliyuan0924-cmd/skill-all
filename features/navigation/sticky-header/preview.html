<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预览：响应式粘性导航栏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
    }

    /* ── 导航栏 ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .navbar.scrolled {
      background: #fff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .navbar.scrolled .logo { color: #1a1a1a; }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 15px;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      padding-bottom: 3px;
      border-bottom: 2px solid transparent;
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    .navbar.scrolled .nav-links a { color: #444; }

    .nav-links a:hover,
    .nav-links a.active {
      border-bottom-color: currentColor;
    }

    /* ── 汉堡菜单（移动端） ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: #fff;
      transition: background 0.3s ease, transform 0.3s ease, opacity 0.3s ease;
      transform-origin: center;
    }

    .navbar.scrolled .hamburger span { background: #1a1a1a; }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── 移动端展开菜单 ── */
    .mobile-menu {
      display: none;
      position: fixed;
      top: 64px; left: 0; right: 0;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      padding: 16px 0;
      z-index: 999;
      animation: slideDown 0.25s ease;
    }

    .mobile-menu.open { display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .mobile-menu a {
      display: block;
      padding: 14px 24px;
      color: #333;
      text-decoration: none;
      font-size: 15px;
    }

    .mobile-menu a.active { color: #4F6EF7; font-weight: 600; }
    .mobile-menu a:hover { background: #f8f8f8; }

    /* ── 响应式 ── */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .navbar { padding: 0 20px; }
    }

    /* ── 演示页面内容 ── */
    .hero {
      height: 100vh;
      background: linear-gradient(135deg, #4F6EF7 0%, #7C3AED 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      text-align: center;
    }

    .hero h1 { font-size: 48px; margin-bottom: 16px; }
    .hero p { font-size: 18px; opacity: 0.8; }
    .hero .hint {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.6;
      animation: bounce 2s ease infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    .content-section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    .content-section p { font-size: 20px; color: #666; }

    /* ── 预览说明 ── */
    .preview-badge {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <a href="#" class="logo">品牌名称</a>
    <ul class="nav-links">
      <li><a href="#" class="active">首页</a></li>
      <li><a href="#">关于我们</a></li>
      <li><a href="#">服务</a></li>
      <li><a href="#">案例</a></li>
      <li><a href="#">联系我们</a></li>
    </ul>
    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

  <!-- 移动端展开菜单 -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#" class="active">首页</a>
    <a href="#">关于我们</a>
    <a href="#">服务</a>
    <a href="#">案例</a>
    <a href="#">联系我们</a>
  </div>

  <!-- 页面内容（用于触发滚动） -->
  <section class="hero">
    <h1>首屏内容区域</h1>
    <p>向下滚动查看导航栏的吸顶效果</p>
    <p class="hint">↓ 向下滚动</p>
  </section>

  <section class="content-section">
    <p>向上滚动，导航栏背景恢复透明</p>
  </section>

  <div class="preview-badge">功能池预览 · 响应式粘性导航栏</div>

  <script>
    const navbar = document.getElementById('navbar');
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    /** 滚动超过 80px 时切换 scrolled 状态 */
    window.addEventListener('scroll', () => {
      if (window.scrollY > 80) {
        navbar.classList.add('scrolled');
      } else {
        navbar.classList.remove('scrolled');
      }
    });

    /** 汉堡菜单切换 */
    function toggleMenu() {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
    }

    /** 点击外部区域关闭菜单 */
    document.addEventListener('click', (e) => {
      if (!navbar.contains(e.target) && !mobileMenu.contains(e.target)) {
        hamburger.classList.remove('open');
        mobileMenu.classList.remove('open');
      }
    });
  </script>
</body>
</html>
