<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>功能沉淀池 · 管理后台</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 登录页 -->
  <div id="login-page">
    <div class="login-card">
      <div class="login-icon">📦</div>
      <h1>功能沉淀池</h1>
      <p>管理后台 · 请输入访问密码</p>
      <input type="password" id="pwd-input" placeholder="访问密码" autocomplete="current-password">
      <p class="err" id="login-err"></p>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">进入后台</button>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="main-app" style="display:none">

    <!-- 顶部 -->
    <div id="header">
      <span class="logo">功能沉淀池</span>

      <!-- 四个 Tab -->
      <div class="header-tabs">
        <button class="htab active" id="htab-pending"  onclick="switchTab('pending')">
          待审核 <span class="htab-count" id="cnt-pending">0</span>
        </button>
        <button class="htab" id="htab-approved" onclick="switchTab('approved')">
          已上线 <span class="htab-count" id="cnt-approved">0</span>
        </button>
        <button class="htab" id="htab-rejected" onclick="switchTab('rejected')">
          已驳回 <span class="htab-count" id="cnt-rejected">0</span>
        </button>
        <button class="htab" id="htab-archived" onclick="switchTab('archived')">
          已下架 <span class="htab-count" id="cnt-archived">0</span>
        </button>
      </div>

      <div class="header-spacer"></div>
      <button class="btn btn-ghost btn-sm" onclick="refreshAll()">↻ 刷新</button>
    </div>

    <!-- 主体 -->
    <div id="app">

      <!-- 左侧列表 -->
      <div id="sidebar">
        <!-- 搜索 + 分类筛选 -->
        <div class="sidebar-filters">
          <input type="text" id="search-input" placeholder="搜索功能名称…" oninput="filterList()">
          <select id="category-filter" onchange="filterList()">
            <option value="">全部分类</option>
            <option value="navigation">导航</option>
            <option value="hero">首屏</option>
            <option value="content">内容</option>
            <option value="forms">表单</option>
            <option value="ecommerce">电商</option>
            <option value="media">媒体</option>
            <option value="interactive">交互</option>
            <option value="layout">布局</option>
            <option value="animation">动效</option>
            <option value="industry">行业</option>
          </select>
        </div>
        <div id="feature-list"></div>
      </div>

      <!-- 右侧详情 -->
      <div id="detail-panel">

        <div id="empty-state">
          <span class="empty-icon">📋</span>
          <p>从左侧选择功能卡片查看详情</p>
        </div>

        <div id="detail-content" style="display:none">

          <!-- 详情头部 -->
          <div id="detail-header">
            <div class="detail-info">
              <h2 id="detail-title">—</h2>
              <div class="detail-meta" id="detail-meta">—</div>
            </div>
            <div class="header-actions" id="review-actions" style="display:none">
              <button class="btn btn-danger btn-sm" onclick="openRejectModal()">✕ 驳回</button>
              <button class="btn btn-success btn-sm" id="approve-btn" onclick="approveCurrentPR()">✓ 通过并合并</button>
            </div>
            <div class="header-actions" id="approved-actions" style="display:none">
              <button class="btn btn-warning btn-sm" onclick="archiveCurrent()">⬇ 下架</button>
            </div>
            <div class="header-actions" id="archived-actions" style="display:none">
              <button class="btn btn-primary btn-sm" onclick="restoreCurrent()">⬆ 恢复上线</button>
            </div>
          </div>

          <!-- 内容主体（预览 + 信息） -->
          <div id="detail-body">
            <!-- 左：预览 iframe -->
            <div id="preview-pane">
              <div class="pane-title">效果预览</div>
              <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
            </div>

            <!-- 右：信息面板（tabbed） -->
            <div id="info-pane">
              <div class="info-tabs">
                <button class="itab active" id="itab-skill"    onclick="switchInfoTab('skill')">AI 配方</button>
                <button class="itab"        id="itab-history"  onclick="switchInfoTab('history')">版本历史</button>
                <button class="itab"        id="itab-reject"   onclick="switchInfoTab('reject')" style="display:none">驳回原因</button>
              </div>
              <div id="info-skill"   class="info-tab-panel active"><div class="loading-spinner">加载中…</div></div>
              <div id="info-history" class="info-tab-panel"></div>
              <div id="info-reject"  class="info-tab-panel"></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- 驳回弹窗 -->
  <div id="reject-modal">
    <div class="modal-card">
      <h3>驳回功能卡片</h3>
      <p>填写驳回原因，将自动评论到 PR 并通知提交人</p>
      <textarea id="reject-reason" placeholder="例如：需求描述不够完整，请补充「关键约束」部分后重新提交。"></textarea>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeRejectModal()">取消</button>
        <button class="btn btn-danger" onclick="confirmReject()">确认驳回</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
